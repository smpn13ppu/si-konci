<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SI-KONCI - Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
    <link rel="stylesheet" href="css/style.css" />
    
    <!-- LOAD SUPABASE -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabase-client.js"></script>
    
    <style>
        .login-page {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #f5f7ff 0%, #e8f5e9 100%);
            padding: 20px;
        }
        .login-container {
            background: white;
            border-radius: 24px;
            padding: 48px 40px;
            max-width: 420px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(0,0,0,0.12);
        }
        .login-container .logo {
            text-align: center;
            margin-bottom: 32px;
        }
        .login-container .logo i {
            font-size: 2.5rem;
            color: var(--secondary);
        }
        .login-container .logo h1 {
            font-size: 1.8rem;
            font-weight: 800;
            color: var(--primary);
            margin-top: 8px;
        }
        .login-container .logo p {
            color: var(--gray-600);
            font-size: 0.9rem;
        }
        .form-group {
            margin-bottom: 18px;
        }
        .form-group label {
            display: block;
            font-weight: 600;
            font-size: 0.9rem;
            color: var(--gray-700);
            margin-bottom: 6px;
        }
        .form-group input, .form-group select {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid var(--gray-300);
            border-radius: var(--radius-sm);
            font-family: var(--font-family);
            font-size: 0.95rem;
            transition: var(--transition);
        }
        .form-group input:focus, .form-group select:focus {
            outline: none;
            border-color: var(--secondary);
            box-shadow: 0 0 0 3px rgba(0, 137, 123, 0.15);
        }
        .btn-block {
            width: 100%;
            justify-content: center;
            padding: 14px;
            font-size: 1rem;
        }
        .login-footer {
            text-align: center;
            margin-top: 20px;
            font-size: 0.9rem;
            color: var(--gray-600);
        }
        .login-footer a {
            color: var(--secondary);
            font-weight: 600;
            cursor: pointer;
        }
        .alert {
            padding: 12px 16px;
            border-radius: var(--radius-sm);
            margin-bottom: 16px;
            display: none;
        }
        .alert.error {
            display: block;
            background: #fce4ec;
            color: #c62828;
            border-left: 4px solid #c62828;
        }
        .alert.success {
            display: block;
            background: #e8f5e9;
            color: #2e7d32;
            border-left: 4px solid #2e7d32;
        }
        .btn-primary {
            background: var(--primary);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: var(--radius-sm);
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition);
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow-md);
        }
        .btn-secondary {
            background: var(--secondary);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: var(--radius-sm);
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition);
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }
        .btn-secondary:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow-md);
        }
        .btn-outline {
            background: transparent;
            color: var(--gray-700);
            border: 2px solid var(--gray-300);
            padding: 12px 24px;
            border-radius: var(--radius-sm);
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition);
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }
        .btn-outline:hover {
            border-color: var(--secondary);
            color: var(--secondary);
        }
        .btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }
        .required {
            color: var(--danger);
        }
        small {
            display: block;
            margin-top: 4px;
        }
        .register-fields {
            display: none;
        }
    </style>
</head>
<body>
    <div class="login-page">
        <div class="login-container">
            <div class="logo">
                <i class="fas fa-brain"></i>
                <h1>SI-KONCI</h1>
                <p>Sistem Konseling Cerdas & Integratif</p>
                <p style="font-size:0.8rem; color:var(--gray-500);">SMPN 13 Penajam Paser Utara</p>
            </div>

            <div id="alertMessage" class="alert"></div>

            <form id="loginForm">
                <div class="form-group">
                    <label><i class="fas fa-envelope"></i> Email</label>
                    <input type="email" id="email" placeholder="Masukkan email" required />
                </div>
                <div class="form-group">
                    <label><i class="fas fa-lock"></i> Password</label>
                    <input type="password" id="password" placeholder="Masukkan password" required />
                </div>
                <div class="form-group">
                    <label><i class="fas fa-user-tag"></i> Login Sebagai</label>
                    <select id="role">
                        <option value="siswa">Siswa</option>
                        <option value="guru">Guru BK</option>
                        <option value="orangtua">Orang Tua</option>
                    </select>
                </div>
                <button type="submit" class="btn btn-primary btn-block">
                    <i class="fas fa-sign-in-alt"></i> Masuk
                </button>
            </form>

            <div class="login-footer">
                <p>Belum punya akun? <a id="showRegister">Daftar di sini</a></p>
            </div>
        </div>
    </div>

    <!-- Register Modal -->
    <div id="registerModal" style="display:none; position:fixed; top:0; left:0; right:0; bottom:0; background:rgba(0,0,0,0.5); z-index:9999; align-items:center; justify-content:center; padding:20px;">
        <div style="background:white; border-radius:24px; padding:40px; max-width:440px; width:100%; max-height:90vh; overflow-y:auto;">
            <h2 style="text-align:center; margin-bottom:24px;">Daftar Akun</h2>
            <form id="registerForm">
                <div class="form-group">
                    <label>Nama Lengkap</label>
                    <input type="text" id="regName" placeholder="Nama lengkap" required />
                </div>
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" id="regEmail" placeholder="Email" required />
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="regPassword" placeholder="Minimal 6 karakter" required minlength="6" />
                </div>
                <div class="form-group">
                    <label>Daftar Sebagai</label>
                    <select id="regRole">
                        <option value="siswa">Siswa</option>
                        <option value="orangtua">Orang Tua</option>
                    </select>
                </div>
                
                <!-- Field untuk Siswa -->
<div class="form-group register-fields" id="regSiswaFields">
    <label>NIS <span class="required">*</span></label>
    <input type="text" id="regNIS" placeholder="Masukkan NIS" required />
    <small style="color: var(--gray-500); font-size: 0.8rem;">
        <i class="fas fa-info-circle"></i> NIS wajib diisi!
    </small>
</div>
<div class="form-group register-fields" id="regKelasField">
    <label>Kelas</label>
    <input type="text" id="regKelas" placeholder="Contoh: 7A" />
    
</div>
                
                <!-- Field untuk Orang Tua -->
                <div class="form-group register-fields" id="regAnakFields">
                    <label>NIS Anak <span class="required">*</span></label>
                    <input type="text" id="regAnakNIS" placeholder="Masukkan NIS anak" />
                    <small style="color: var(--gray-500); font-size: 0.8rem;">
                        <i class="fas fa-info-circle"></i> Jika NIS belum terdaftar, akan disimpan dan terhubung otomatis saat siswa mendaftar
                    </small>
                </div>
                <div class="form-group register-fields" id="regAnakNamaField">
                    <label>Nama Anak <span class="required">*</span></label>
                    <input type="text" id="regAnakNama" placeholder="Masukkan nama anak" />
                </div>
                
                <button type="submit" class="btn btn-secondary btn-block">Daftar</button>
                <button type="button" id="closeRegister" class="btn btn-outline btn-block" style="margin-top:8px;">Batal</button>
            </form>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            console.log('🚀 Login page loaded');
            
            // Test connection
            if (typeof testSupabaseConnection === 'function') {
                testSupabaseConnection();
            }
            
            // ============================================
            // DOM ELEMENTS
            // ============================================
            const loginForm = document.getElementById('loginForm');
            const alertEl = document.getElementById('alertMessage');
            const showRegister = document.getElementById('showRegister');
            const registerModal = document.getElementById('registerModal');
            const closeRegister = document.getElementById('closeRegister');
            
            // Register form elements
            const regRole = document.getElementById('regRole');
            const regSiswaFields = document.getElementById('regSiswaFields');
            const regKelasField = document.getElementById('regKelasField');
            const regAnakFields = document.getElementById('regAnakFields');
            const regAnakNamaField = document.getElementById('regAnakNamaField');

            // ============================================
            // SHOW/HIDE REGISTER FIELDS BERDASARKAN ROLE
            // ============================================
            function toggleRegisterFields() {
                // Sembunyikan semua field tambahan dulu
                regSiswaFields.style.display = 'none';
                regKelasField.style.display = 'none';
                regAnakFields.style.display = 'none';
                regAnakNamaField.style.display = 'none';
                
                if (regRole.value === 'siswa') {
                    regSiswaFields.style.display = 'block';
                    regKelasField.style.display = 'block';
                } else if (regRole.value === 'orangtua') {
                    regAnakFields.style.display = 'block';
                    regAnakNamaField.style.display = 'block';
                }
            }

            // Event listener untuk perubahan role
            regRole.addEventListener('change', toggleRegisterFields);
            
            // Jalankan pertama kali untuk set default
            toggleRegisterFields();

            // ============================================
            // SHOW/HIDE REGISTER MODAL
            // ============================================
            showRegister.addEventListener('click', function(e) {
                e.preventDefault();
                registerModal.style.display = 'flex';
                // Reset form
                document.getElementById('registerForm').reset();
                toggleRegisterFields();
            });

            closeRegister.addEventListener('click', function() {
                registerModal.style.display = 'none';
            });

            registerModal.addEventListener('click', function(e) {
                if (e.target === this) {
                    this.style.display = 'none';
                }
            });

            // ============================================
            // LOGIN
            // ============================================
            loginForm.addEventListener('submit', async function(e) {
                e.preventDefault();
                
                const email = document.getElementById('email').value;
                const password = document.getElementById('password').value;
                const role = document.getElementById('role').value;

                const btn = this.querySelector('button[type="submit"]');
                const originalText = btn.innerHTML;
                btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Loading...';
                btn.disabled = true;

                try {
                    // === VALIDASI SEBELUM LOGIN ===
                    const client = getSupabase();
                    if (!client) {
                        throw new Error('Koneksi database gagal');
                    }
                    
                    const tableMap = { siswa: 'siswa', guru: 'guru', orangtua: 'orangtua' };
                    const table = tableMap[role];
                    
                    // Cek apakah email terdaftar di tabel sesuai role
                    const { data: userCheck, error: checkError } = await client
                        .from(table)
                        .select('email, nama')
                        .eq('email', email)
                        .maybeSingle();
                    
                    if (checkError) {
                        console.error('❌ Check error:', checkError);
                    }
                    
                    if (!userCheck) {
                        const roleNames = {
                            siswa: 'Siswa',
                            guru: 'Guru BK',
                            orangtua: 'Orang Tua'
                        };
                        alert(`❌ Email tidak terdaftar sebagai ${roleNames[role]}.\n\nSilakan:\n1. Periksa kembali email Anda\n2. Pilih role yang sesuai\n3. Daftar jika belum memiliki akun`);
                        btn.innerHTML = originalText;
                        btn.disabled = false;
                        return;
                    }
                    
                    console.log('✅ User found as:', role, userCheck.nama);
                    
                    // === LANJUTKAN LOGIN ===
                    const result = await loginUser(email, password, role);
                    
                    if (result) {
                        sessionStorage.setItem('user', JSON.stringify(result));
                        sessionStorage.setItem('role', role);
                        
                        const redirectMap = {
                            siswa: 'siswa.html',
                            guru: 'guru.html',
                            orangtua: 'orangtua.html'
                        };
                        window.location.href = redirectMap[role] || 'index.html';
                    } else {
                        alert('❌ Login gagal! Periksa email dan password Anda.');
                    }
                } catch (error) {
                    console.error('❌ Login error:', error);
                    alert('Terjadi kesalahan: ' + error.message);
                }

                btn.innerHTML = originalText;
                btn.disabled = false;
            });

            // ============================================
            // REGISTER
            // ============================================
            document.getElementById('registerForm').addEventListener('submit', async function(e) {
                e.preventDefault();
                
                const name = document.getElementById('regName').value;
                const email = document.getElementById('regEmail').value;
                const password = document.getElementById('regPassword').value;
                const role = document.getElementById('regRole').value;

                const data = {
                    nama: name,
                    email: email,
                    password: password
                };

                let result = null;

                // === VALIDASI ===
                if (!name || !email || !password) {
                    alert('⚠️ Mohon lengkapi semua field!');
                    return;
                }

                if (password.length < 6) {
                    alert('⚠️ Password minimal 6 karakter!');
                    return;
                }

                if (role === 'siswa') {
    var nis = document.getElementById('regNIS').value.trim();
    var kelas = document.getElementById('regKelas').value.trim();
    
    // ✅ Validasi NIS
    if (!nis) {
        alert('⚠️ NIS wajib diisi untuk pendaftaran siswa!');
        return;
    }
    
    // ✅ Cek NIS (real-time)
    if (typeof cekNIS === 'function') {
        const nisExists = await cekNIS(nis);
        if (nisExists) {
            alert('⚠️ NIS sudah terdaftar! Gunakan NIS yang lain.');
            return;
        }
    }
    
    data.nis = nis;
    data.kelas = kelas || 'Belum ditentukan';
    data.no_hp = '';
    
    if (typeof registerSiswa !== 'function') {
        alert('❌ Fungsi registerSiswa tidak ditemukan!');
        return;
    }
    
    // ✅ Handle hasil register dengan benar
    const result = await registerSiswa(data);
    
    if (result && result.success) {
        alert('✅ ' + result.message);
        registerModal.style.display = 'none';
        document.getElementById('email').value = data.email;
        document.getElementById('password').value = data.password;
        document.getElementById('role').value = 'siswa';
    } else if (result && result.error) {
        alert('❌ ' + result.error);
    } else {
        alert('❌ Registrasi gagal. Coba lagi.');
    }
                    
                } else if (role === 'guru') {
                    data.nip = 'GUR' + Date.now().toString().slice(-6);
                    data.mata_pelajaran = 'Bimbingan Konseling';
                    data.no_hp = '';
                    
                    result = await registerUser(data, role);
                    
                } else if (role === 'orangtua') {
                    data.id_orangtua = 'ORT' + Date.now().toString().slice(-6);
                    data.anak_nis = document.getElementById('regAnakNIS').value.trim();
                    data.anak_nama = document.getElementById('regAnakNama').value.trim();
                    data.no_hp = '';
                    
                    // Validasi NIS
                    if (!data.anak_nis) {
                        alert('⚠️ Mohon masukkan NIS anak!');
                        return;
                    }
                    
                    if (typeof registerOrangTua !== 'function') {
                        alert('❌ Fungsi registerOrangTua tidak ditemukan!');
                        return;
                    }
                    result = await registerOrangTua(data);
                }

                // Handle hasil registrasi
                if (result && result.error) {
                    alert('❌ ' + result.error);
                    return;
                }
                
                if (result) {
                    const roleNames = {
                        siswa: 'Siswa',
                        guru: 'Guru BK',
                        orangtua: 'Orang Tua'
                    };
                    alert(`✅ Registrasi berhasil sebagai ${roleNames[role]}! Silakan login.`);
                    registerModal.style.display = 'none';
                    document.getElementById('email').value = email;
                    document.getElementById('password').value = password;
                    document.getElementById('role').value = role;
                } else {
                    alert('❌ Registrasi gagal. Coba lagi.');
                }
            });

            // ============================================
            // CLOSE MODAL WITH ESC
            // ============================================
            document.addEventListener('keydown', function(e) {
                if (e.key === 'Escape' && registerModal.style.display === 'flex') {
                    registerModal.style.display = 'none';
                }
            });

            console.log('✅ Login page ready');
        });
    </script>
</body>
</html>
