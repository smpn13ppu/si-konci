<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SI-KONCI - Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
    <link rel="stylesheet" href="css/style.css" />
    <style>
        .login-page {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #f5f7ff 0%, #e8f5e9 100%);
            padding: 20px;
        }
        .login-container {
            background: white;
            border-radius: 24px;
            padding: 48px 40px;
            max-width: 420px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(0,0,0,0.12);
        }
        .login-container .logo {
            text-align: center;
            margin-bottom: 32px;
        }
        .login-container .logo i {
            font-size: 2.5rem;
            color: #00897b;
        }
        .login-container .logo h1 {
            font-size: 1.8rem;
            font-weight: 800;
            color: #1a237e;
            margin-top: 8px;
        }
        .login-container .logo p {
            color: #6c757d;
            font-size: 0.9rem;
        }
        .form-group {
            margin-bottom: 18px;
        }
        .form-group label {
            display: block;
            font-weight: 600;
            font-size: 0.9rem;
            color: #495057;
            margin-bottom: 6px;
        }
        .form-group input, .form-group select {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid #dee2e6;
            border-radius: 8px;
            font-family: 'Inter', sans-serif;
            font-size: 0.95rem;
            transition: all 0.3s;
        }
        .form-group input:focus, .form-group select:focus {
            outline: none;
            border-color: #00897b;
            box-shadow: 0 0 0 3px rgba(0, 137, 123, 0.15);
        }
        .btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 12px 28px;
            font-weight: 600;
            font-size: 1rem;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s;
            font-family: 'Inter', sans-serif;
            justify-content: center;
        }
        .btn-primary {
            background: #1a237e;
            color: white;
        }
        .btn-primary:hover {
            background: #3949ab;
            transform: translateY(-2px);
        }
        .btn-secondary {
            background: #00897b;
            color: white;
        }
        .btn-secondary:hover {
            background: #26a69a;
            transform: translateY(-2px);
        }
        .btn-outline {
            background: transparent;
            color: #1a237e;
            border: 2px solid #1a237e;
        }
        .btn-outline:hover {
            background: #1a237e;
            color: white;
        }
        .btn-block {
            width: 100%;
            justify-content: center;
        }
        .login-footer {
            text-align: center;
            margin-top: 20px;
            font-size: 0.9rem;
            color: #6c757d;
        }
        .login-footer a {
            color: #00897b;
            font-weight: 600;
            cursor: pointer;
        }
        .alert {
            padding: 12px 16px;
            border-radius: 8px;
            margin-bottom: 16px;
            display: none;
        }
        .alert.error {
            display: block;
            background: #fce4ec;
            color: #c62828;
            border-left: 4px solid #c62828;
        }
        .alert.success {
            display: block;
            background: #e8f5e9;
            color: #2e7d32;
            border-left: 4px solid #2e7d32;
        }
        /* Register Modal */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.5);
            z-index: 9999;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .modal.active {
            display: flex;
        }
        .modal-content {
            background: white;
            border-radius: 24px;
            padding: 40px;
            max-width: 440px;
            width: 100%;
            max-height: 90vh;
            overflow-y: auto;
        }
        .modal-content h2 {
            text-align: center;
            margin-bottom: 24px;
            color: #1a237e;
        }
        @media (max-width: 480px) {
            .login-container {
                padding: 32px 20px;
            }
        }
    </style>
</head>
<body>
    <div class="login-page">
        <div class="login-container">
            <div class="logo">
                <i class="fas fa-brain"></i>
                <h1>SI-KONCI</h1>
                <p>Sistem Konseling Cerdas & Integratif</p>
                <p style="font-size:0.8rem; color:#adb5bd;">SMPN 13 Penajam Paser Utara</p>
            </div>

            <div id="alertMessage" class="alert"></div>

            <form id="loginForm">
                <div class="form-group">
                    <label><i class="fas fa-envelope"></i> Email</label>
                    <input type="email" id="email" placeholder="Masukkan email" required />
                </div>
                <div class="form-group">
                    <label><i class="fas fa-lock"></i> Password</label>
                    <input type="password" id="password" placeholder="Masukkan password" required />
                </div>
                <div class="form-group">
                    <label><i class="fas fa-user-tag"></i> Login Sebagai</label>
                    <select id="role">
                        <option value="siswa">Siswa</option>
                        <option value="guru">Guru BK</option>
                        <option value="orangtua">Orang Tua</option>
                    </select>
                </div>
                <button type="submit" class="btn btn-primary btn-block">
                    <i class="fas fa-sign-in-alt"></i> Masuk
                </button>
            </form>

            <div class="login-footer">
                <p>Belum punya akun? <a id="showRegister">Daftar di sini</a></p>
            </div>
        </div>
    </div>

    <!-- Register Modal -->
    <div class="modal" id="registerModal">
        <div class="modal-content">
            <h2>📝 Daftar Akun</h2>
            <form id="registerForm">
                <div class="form-group">
                    <label>Nama Lengkap</label>
                    <input type="text" id="regName" placeholder="Nama lengkap" required />
                </div>
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" id="regEmail" placeholder="Email" required />
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="regPassword" placeholder="Minimal 6 karakter" required minlength="6" />
                </div>
                <div class="form-group">
                    <label>Daftar Sebagai</label>
                    <select id="regRole">
                        <option value="siswa">Siswa</option>
                        <option value="guru">Guru BK</option>
                        <option value="orangtua">Orang Tua</option>
                    </select>
                </div>
                <div class="form-group" id="regSiswaFields">
                    <label>NIS (untuk siswa)</label>
                    <input type="text" id="regNIS" placeholder="NIS" />
                </div>
                <div class="form-group" id="regKelasField">
                    <label>Kelas (untuk siswa)</label>
                    <input type="text" id="regKelas" placeholder="Contoh: IX-A" />
                </div>
                <button type="submit" class="btn btn-secondary btn-block">Daftar</button>
                <button type="button" id="closeRegister" class="btn btn-outline btn-block" style="margin-top:8px;">Batal</button>
            </form>
        </div>
    </div>

    <!-- LOAD SCRIPTS -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <!-- SEMUA KODE DI SATUKAN DI SINI (tidak perlu load supabase-client.js terpisah) -->
    <script>
    // ============================================
    // SI-KONCI - Supabase Integration
    // ============================================
    
    (function() {
        'use strict';
        
        console.log('🚀 Initializing SI-KONCI...');
        
        // Konfigurasi
        const SUPABASE_URL = 'https://huqswtchblugmpjbrkai.supabase.co';
        const SUPABASE_ANON_KEY = 'sb_publishable_oeC_VDEatcw3J6J-xhDtzQ_x6bVaC_k';
        
        let supabaseClient = null;
        
        function initSupabase() {
            if (typeof supabase === 'undefined') {
                console.warn('⚠️ Supabase library not loaded. Using mock mode.');
                return null;
            }
            try {
                supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
                console.log('✅ Supabase connected!');
                return supabaseClient;
            } catch (error) {
                console.error('❌ Supabase error:', error);
                return null;
            }
        }
        
        function getSupabase() {
            if (!supabaseClient) return initSupabase();
            return supabaseClient;
        }
        
        // MOCK DATA
        const MOCK_SISWA = [
            { nis: '001', nama: 'Andi Prasetyo', kelas: 'IX-A', no_hp: '08123456789', email: 'andi@email.com', password: 'password123' },
            { nis: '002', nama: 'Budi Santoso', kelas: 'IX-B', no_hp: '08123456780', email: 'budi@email.com', password: 'password123' }
        ];
        
        const MOCK_GURU = [
            { nip: 'BK001', nama: 'Ibu Siti', email: 'guru@email.com', password: 'password123' }
        ];
        
        const MOCK_ORANGTUA = [
            { id_orangtua: 'ORTU001', nama: 'Bapak Ahmad', email: 'ortu@email.com', password: 'password123' }
        ];
        
        // LOGIN
        async function loginUser(email, password, role) {
            console.log('🔐 Login:', email, role);
            
            const client = getSupabase();
            if (!client) {
                console.log('📱 Using mock login');
                return mockLogin(email, password, role);
            }
            
            try {
                const { data: authData, error: authError } = await client.auth.signInWithPassword({
                    email: email,
                    password: password
                });
                
                if (authError) {
                    console.log('📱 Auth failed, using mock');
                    return mockLogin(email, password, role);
                }
                
                console.log('✅ Auth success');
                
                const tableMap = { siswa: 'siswa', guru: 'guru', orangtua: 'orangtua' };
                const table = tableMap[role];
                if (!table) return null;
                
                const { data: userData, error: userError } = await client
                    .from(table)
                    .select('*')
                    .eq('email', email)
                    .maybeSingle();
                    
                if (userError || !userData) {
                    return mockLogin(email, password, role);
                }
                
                return { ...userData, role };
                
            } catch (error) {
                console.error('❌ Login error:', error);
                return mockLogin(email, password, role);
            }
        }
        
        function mockLogin(email, password, role) {
            let user = null;
            if (role === 'siswa') user = MOCK_SISWA.find(u => u.email === email && u.password === password);
            else if (role === 'guru') user = MOCK_GURU.find(u => u.email === email && u.password === password);
            else if (role === 'orangtua') user = MOCK_ORANGTUA.find(u => u.email === email && u.password === password);
            return user ? { ...user, role } : null;
        }
        
        // REGISTER
        async function registerUser(data, role) {
            console.log('📝 Register:', data.email, role);
            
            const client = getSupabase();
            if (!client) {
                console.log('📱 Using mock register');
                return mockRegister(data, role);
            }
            
            try {
                const { data: authData, error: authError } = await client.auth.signUp({
                    email: data.email,
                    password: data.password,
                    options: { data: { role: role, name: data.nama } }
                });
                
                if (authError) {
                    console.log('📱 Auth register failed, using mock');
                    return mockRegister(data, role);
                }
                
                const tableMap = { siswa: 'siswa', guru: 'guru', orangtua: 'orangtua' };
                const table = tableMap[role];
                if (!table) return null;
                
                const insertData = { ...data };
                delete insertData.password;
                insertData.user_id = authData.user.id;
                insertData.created_at = new Date().toISOString();
                
                const { data: userData, error: userError } = await client
                    .from(table)
                    .insert([insertData])
                    .select()
                    .maybeSingle();
                    
                if (userError) {
                    console.log('📱 Insert failed, using mock');
                    return mockRegister(data, role);
                }
                
                return userData;
                
            } catch (error) {
                console.error('❌ Register error:', error);
                return mockRegister(data, role);
            }
        }
        
        function mockRegister(data, role) {
            const newUser = { ...data, created_at: new Date().toISOString() };
            if (role === 'siswa') {
                newUser.nis = 'SIS' + Date.now().toString().slice(-6);
                MOCK_SISWA.push(newUser);
            } else if (role === 'guru') {
                newUser.nip = 'GUR' + Date.now().toString().slice(-6);
                MOCK_GURU.push(newUser);
            } else if (role === 'orangtua') {
                newUser.id_orangtua = 'ORT' + Date.now().toString().slice(-6);
                MOCK_ORANGTUA.push(newUser);
            }
            return newUser;
        }
        
        // TEST
        async function testConnection() {
            console.log('🔍 Testing connection...');
            const client = getSupabase();
            if (!client) {
                console.log('📱 Using MOCK mode');
                return false;
            }
            try {
                const { data, error } = await client.from('siswa').select('count');
                if (error) {
                    console.log('📱 Query failed, using MOCK mode');
                    return false;
                }
                console.log('✅ Database connected!');
                return true;
            } catch (e) {
                console.log('📱 Connection error, using MOCK mode');
                return false;
            }
        }
        
        // EXPOSE KE GLOBAL
        window.loginUser = loginUser;
        window.registerUser = registerUser;
        window.testConnection = testConnection;
        window.getSupabase = getSupabase;
        
        console.log('✅ SI-KONCI initialized!');
        console.log('📱 Available: loginUser, registerUser, testConnection');
        
        // ============================================
        // UI LOGIC
        // ============================================
        
        document.addEventListener('DOMContentLoaded', function() {
            console.log('📄 Page ready');
            
            // Test connection
            testConnection();
            
            // Login form
            const loginForm = document.getElementById('loginForm');
            if (loginForm) {
                loginForm.addEventListener('submit', async function(e) {
                    e.preventDefault();
                    
                    const email = document.getElementById('email').value;
                    const password = document.getElementById('password').value;
                    const role = document.getElementById('role').value;
                    
                    const btn = this.querySelector('button[type="submit"]');
                    const originalText = btn.innerHTML;
                    btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Loading...';
                    btn.disabled = true;
                    
                    try {
                        const result = await window.loginUser(email, password, role);
                        console.log('📥 Result:', result);
                        
                        if (result) {
                            sessionStorage.setItem('user', JSON.stringify(result));
                            sessionStorage.setItem('role', role);
                            
                            const redirects = {
                                siswa: 'siswa.html',
                                guru: 'guru.html',
                                orangtua: 'orangtua.html'
                            };
                            window.location.href = redirects[role] || 'index.html';
                        } else {
                            alert('❌ Login gagal!\n\nAkun demo:\nEmail: andi@email.com\nPassword: password123\nRole: Siswa');
                        }
                    } catch (error) {
                        alert('❌ Error: ' + error.message);
                    }
                    
                    btn.innerHTML = originalText;
                    btn.disabled = false;
                });
            }
            
            // Register form
            const registerForm = document.getElementById('registerForm');
            if (registerForm) {
                registerForm.addEventListener('submit', async function(e) {
                    e.preventDefault();
                    
                    const name = document.getElementById('regName').value;
                    const email = document.getElementById('regEmail').value;
                    const password = document.getElementById('regPassword').value;
                    const role = document.getElementById('regRole').value;
                    
                    const data = { nama: name, email: email, password: password };
                    
                    if (role === 'siswa') {
                        data.nis = document.getElementById('regNIS').value || 'SIS' + Date.now().toString().slice(-6);
                        data.kelas = document.getElementById('regKelas').value || 'IX-A';
                        data.no_hp = '';
                    } else if (role === 'guru') {
                        data.nip = 'GUR' + Date.now().toString().slice(-6);
                        data.mata_pelajaran = 'BK';
                        data.no_hp = '';
                    } else {
                        data.id_orangtua = 'ORT' + Date.now().toString().slice(-6);
                        data.anak_nis = '';
                        data.anak_nama = '';
                        data.no_hp = '';
                    }
                    
                    try {
                        const result = await window.registerUser(data, role);
                        if (result) {
                            alert('✅ Registrasi berhasil! Silakan login.');
                            document.getElementById('registerModal').classList.remove('active');
                            document.getElementById('email').value = email;
                            document.getElementById('password').value = password;
                        } else {
                            alert('❌ Registrasi gagal. Coba lagi.');
                        }
                    } catch (error) {
                        alert('❌ Error: ' + error.message);
                    }
                });
            }
            
            // Modal controls
            const showRegister = document.getElementById('showRegister');
            if (showRegister) {
                showRegister.addEventListener('click', function(e) {
                    e.preventDefault();
                    document.getElementById('registerModal').classList.add('active');
                });
            }
            
            const closeRegister = document.getElementById('closeRegister');
            if (closeRegister) {
                closeRegister.addEventListener('click', function() {
                    document.getElementById('registerModal').classList.remove('active');
                });
            }
            
            document.getElementById('registerModal').addEventListener('click', function(e) {
                if (e.target === this) {
                    this.classList.remove('active');
                }
            });
            
            // Role toggle for register
            const regRole = document.getElementById('regRole');
            if (regRole) {
                regRole.addEventListener('change', function() {
                    const show = this.value === 'siswa';
                    document.getElementById('regSiswaFields').style.display = show ? 'block' : 'none';
                    document.getElementById('regKelasField').style.display = show ? 'block' : 'none';
                });
            }
        });
        
    })();
    </script>
</body>
</html>
